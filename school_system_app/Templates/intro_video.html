<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome video</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.jpg">
    <script src="https://kit.fontawesome.com/ac42c3b1f7.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
        }

        .whole-page {
            height: 400px;
            width: 350px;
            margin: auto;
            margin-top: 80px;
            box-shadow: rgba(0, 0, 0, 0.35) 4px 5px 15px
        }

        .container {
           margin-left: 250px;
           margin-top: 50px;
        }
    </style>
</head>

<body>
    <div class="container">
        <video width="700" height="500" autoplay loop muted controls="false">
            <source src="{% static 'animation.mp4' %}" type="video/mp4">
        </video>
    </div>

    <script>
        setTimeout(function () {
            window.location.href = "{% url 'user_login' %}";
        }, 5000);
    </script>
</body>
</html>
