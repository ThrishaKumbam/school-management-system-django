<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/ac42c3b1f7.js" crossorigin="anonymous"></script>
    <title>Admin Update</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.jpg">
    <style>
        body {
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .navbar {
            display: flex;
            flex-direction: row;
            background-color: rgb(124, 206, 184);
        }

        .logo {
            height: 50px;
            display: flex;
            align-items: center;
            margin-top: 10px;
            margin-left: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .navbar p {
            color: rgb(74, 72, 72);
            display: flex;
            font-family: 'Arial', sans-serif;
            align-items: center;
            font-weight: bold;
            margin-top: 20px;
            margin-right: 30px;
        }

        table,
        th,
        td {
            border: 1px solid gray;
            padding: 10px;
            border-collapse: collapse;
            position: relative;
        }

        th {
            background-color: rgb(124, 206, 184);
            color: rgb(74, 72, 72);
        }

        .heading {
            padding-top: 20px;
            text-align: center;
            color: rgb(74, 72, 72);
            padding-bottom: 10px;
        }

        .left-nav,
        .right-nav {
            width: 50%;
            display: flex;
        }

        .right-nav {
            width: 65%;
            margin-top: 10px;
            justify-content: end;
            align-items: center;
        }

        .dropdown-conatiner {
            margin-top: 0px;
            margin-right: 50px;
            cursor: pointer;
        }

        #display-container {
            display: none;
            height: 55px;
            width: 130px;
            position: absolute;
            right: 15px;
            background-color: white;
            margin-top: 10px;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            background-color: white;
        }

        #display-container div {
            margin-top: 20px;
        }

        #display-container a {
            color: rgb(124, 206, 184);
        }

        .logout a {
            padding-left: 12px;
        }
 
        .active {
            display: none;
 
        }
 
        .bottom {
            display: flex;
            flex-direction: row;
        }
 
        #iconup {
            display: none;
        }
 
        .update-card {
            background-color: white;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            height: 280px;
            width: 700px;
            margin-left: 280px;
            margin-top: 100px;
        }
 
        .update-card h1 {
            color: rgb(74, 72, 72);
            padding-top: 20px;
            padding-bottom: 10px;
        }
 
        .update-card form {
            display: flex;
            flex-wrap: wrap;
        }
 
        .update-card button {
            background-color: rgb(124, 206, 184);
            border: none;
            border-radius: 5px;
            height: 30px;
            width: 80px;
            align-items: center;
            margin-top: 10px;
        }
 
        .update-button {
            margin-left: 260px;
            margin-right: 25px;
            font-weight: bold;
            color: rgb(74, 72, 72) !important;
            cursor: pointer;
        }
 
        .cancel-button {
            padding-left: 0px;
            width: 70px !important;
        }
 
        .update-card a {
            color: rgb(74, 72, 72);
            margin-left: 10px;
            text-decoration: none;
        }
 
        .inputs {
            flex: 0 0 50%;
            margin-bottom: 20px;
        }
 
        .right-aligned-label {
            width: 110px;
            text-align: left;
            display: inline-block;
            font-weight: bold;
        }
 
        .inputs input {
            height: 30px;
            width: 200px;
            border: none;
            border: 0.1px solid gray;
            border-radius: 5px;
            outline: none;
            margin-left: -26px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="left-nav">
            <img src="{% static 'schl logo.png' %}" alt="Logo" class="logo">
            <p>Hello {{ admin_obj.username }}</p>
        </div>
        <div class="right-nav">
            <div class="dropdown-conatiner">
                <i class="fa-solid fa-angle-down" onclick="displayFunction()" id="icondown"></i>
                <i class="fa-solid fa-angle-up" onclick="displayFunction()" id="iconup"></i>
            </div>
        </div>
    </div>

    <div class="bottom">
        <div class="bottom-section">
            <div class="update-card">
                <h1 class="heading">Admin Details</h1>
                <form method="post" action="{% url 'admin_update' id=admin_obj.id %}" class="form">
                    {% csrf_token %}

                    {% for field in form %}
                    <div class="inputs">
                        <label class="right-aligned-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}
                    <button type="submit" class="update-button">Update</button>
                    <button type="submit" class="cancel-button" style="font-weight: bold; color: rgb(74, 72, 72);"><a
                            href="{% url 'my_profile' %}">Cancel</a></button>
                </form>
            </div>
        </div>
        <div id="display-container" class="active">
            <div class="logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <a href="{% url 'user_logout' %}" class="logout">Logout</a>
            </div>
        </div>
    </div>
    <script>
        function displayFunction() {
            var a = document.getElementById("display-container");
            var i = document.getElementById("icondown")
            var i2 = document.getElementById("iconup")

            if (a.classList.contains("active")) {
                a.style.display = "block";
                a.classList.remove("active");
                i2.style.display = "block"
                i.style.display = "none"
            } else {
                a.style.display = "none";
                a.classList.add("active");
                i.style.display = "block"
                i2.style.display = "none"
            }
        }
    </script>
</body>

</html>
