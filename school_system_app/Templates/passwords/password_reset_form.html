<!-- passwords/password_reset_form.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.jpg">
    <script src="https://kit.fontawesome.com/ac42c3b1f7.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            overflow: hidden;
        }

        .page {
            padding-top: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .whole-page {
            max-width: 400px;
            width: 100%;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: rgba(0, 0, 0, 0.35) 4px 5px 15px;
            padding: 20px;
            margin: 20px;
        }

        .login-heading {
            background-color: rgb(124, 206, 184);
            padding: 10px 0;
            text-align: center;
            border-radius: 5px 5px 0 0;
            margin-bottom: 20px;
        }

        .login-heading h3 {
            margin: 0;
        }

        .login-box form{
            margin-top: 30px;
            text-align: center;
        }
        .login-box form label{
            font-weight: bold;
            margin-right: 10px;
        }
        .login-box form button{
            background-color: rgb(124, 206, 184);
            border: none;
            padding: 5px 20px;
            border-radius: 5px;
            font-weight: 600;
            margin-top: 10px;
        }
        .page {
            padding-top: 70px;
        }

        .navbar {
            position: fixed;
            z-index: 1000;
            flex-direction: row;
            background-color: rgb(124, 206, 184);
            overflow: hidden;
            width: 100%;
            height: 70px;
        }

        .navbar img {
            height: 50px;
            display: flex;
            align-items: center;
            margin-top: 3px;
            margin-left: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .navbar-content {
            display: flex;
        }

        .heading {
            font-family: 'Times New Roman', Times, serif;
            font-size: 20px;
            color: rgb(74, 72, 72);
            margin-left: 290px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="navbar" id="navbar">
        <div class="navbar-content">
            <img src="{% static 'schl logo.png' %}" alt="Logo" class="logo">
            <h2 class="heading">Welcome to OSI Digital school system</h2>
        </div>
    </div>
    <div class="page">
        <div class="whole-page">
            <div class="login-box">
                <div class="login-heading">
                    <h3>Password Reset</h3>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit">Reset</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
